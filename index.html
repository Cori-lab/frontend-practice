<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Job Application Form</title>
  </head>

  <body>
    <main class="form-wrapper">
      <form class="form-card">
        <h1>Job Application Form</h1>

        <div class="form-group">
          <label for="name">Full Name: </label>
          <input type="text" id="name" name="name" required />
          <span class="error-message">Please insert your name.</span>
        </div>

        <div class="form-group">
          <label for="email">Email: </label>
          <input type="email" id="email" name="email" required />
          <span class="error-message">Please insert your Email-address.</span>
        </div>

        <div class="form-group">
          <label for="position">Position: </label>
          <select name="position" id="position" required>
            <option value="" disabled selected>Select your position</option>
            <option value="graphic">Graphic Designer</option>
            <option value="frontend">Frontend Developer</option>
            <option value="ux">UX Designer</option>
          </select>
        </div>

        <fieldset class="radio-group">
          <legend>Availability:</legend>

          <div class="radio-option">
            <input type="radio" id="fulltime" name="availability" checked />
            <label for="fulltime">Full-time</label>
          </div>

          <div class="radio-option">
            <input type="radio" id="parttime" name="availability" />
            <label for="parttime">Part-time</label>
          </div>

          <div class="radio-option">
            <input type="radio" id="freelance" name="availability" />
            <label for="freelance">Freelance</label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="message">Tell us about your motivation: </label>
          <textarea
            id="message"
            name="message"
            placeholder="My passion is..."
          ></textarea>
        </div>

        <button type="submit">Submit Form</button>
      </form>
    </main>
  </body>
</html>
